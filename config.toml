[app]
language = "zh-CN"
theme = "dark"
auto_update = true
minimize_to_tray = false
startup_behavior = "normal"

[model]
default_model = "claude-sonnet-4-20250514"
provider = "anthropic"
custom_url = ""
custom_api_key = ""
custom_model_name = ""
temperature = 0.7
max_tokens = 16384
top_p = 1.0
thinking_budget = 10000
stream_mode = true

[api]
api_key = ""
base_url = "https://api.anthropic.com"
api_version = "2023-06-01"
timeout_seconds = 120
retry_count = 3

[ui]
font_size = 14
font_family = "Inter"
sidebar_width = 280
show_line_numbers = true
code_theme = "oneDark"
message_style = "bubble"

[advanced]
data_dir = ""
log_level = "info"
max_conversation_history = 100
auto_compact_tokens = 150000
proxy_url = ""
enable_telemetry = false

[harness]
error_learning_enabled = false
cross_memory_enabled = true
validation_enabled = true
default_memory_visibility = "public"
max_parallel_subtasks = 5
task_timeout_seconds = 300
agents_md_auto_refresh = true

[manop]
enabled = true
cloud_api_url = "https://mano.mininglamp.com"
cloud_api_key = ""
auto_initialize = true
inference_timeout_secs = 30
max_action_steps = 50
confidence_threshold = 0.75